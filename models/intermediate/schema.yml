version: 2

models:
  - name: int_location_conformed
    description: Single source of truth for conformed location logic across EV registrations, charging stations, and population. One row per stable location natural key.
    columns:
      - name: location_natural_key
        description: Stable natural location key derived from normalized location naming and used to align intermediate business concepts.
        data_tests:
          - not_null
          - unique
      - name: population_count
        description: Population associated with the conformed location where available.

  - name: int_ev_metrics
    description: EV adoption and population context at one row per location and month. This model centralizes EV registration counts, total vehicle counts, and population context for downstream facts.
    columns:
      - name: location_natural_key
        description: Stable natural location key used to map EV adoption metrics into the dimensional mart.
        data_tests:
          - not_null
      - name: month_date
        description: First day of the month representing the EV metrics grain.
        data_tests:
          - not_null
      - name: ev_count
        description: Number of EV registrations for the location-month.
        data_tests:
          - not_null
      - name: vehicle_count
        description: Total vehicle registrations for the location-month.
        data_tests:
          - not_null
      - name: population_count
        description: Population associated with the conformed location.

  - name: int_charging_metrics
    description: Charging infrastructure metrics at one row per location. This model centralizes station counts, connector counts, and average connectors per station.
    columns:
      - name: location_natural_key
        description: Stable natural location key used to map charging infrastructure into the dimensional mart.
        data_tests:
          - not_null
          - unique
      - name: station_count
        description: Number of charging stations for the location.
        data_tests:
          - not_null
      - name: connector_count
        description: Total number of connectors for the location.
        data_tests:
          - not_null
      - name: avg_connectors_per_station
        description: Average number of connectors per station for the location.

  - name: int_station_nearest_neighbour
    description: Spatial intermediate model identifying the nearest neighbouring charging station for each station using haversine distance.
    columns:
      - name: station_id
        description: Charging station identifier from the staged EV station model.
        data_tests:
          - not_null
          - unique
      - name: nearest_station_id
        description: Identifier of the nearest neighbouring charging station.
        data_tests:
          - not_null
      - name: distance_km
        description: Great-circle distance in kilometers to the nearest neighbouring charging station.
        data_tests:
          - not_null

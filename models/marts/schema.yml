version: 2

models:
  - name: dim_location
    description: Location dimension for the EV analytics star schema. One row per conformed business location with a surrogate primary key for fact relationships.
    columns:
      - name: dim_location_key
        description: Surrogate primary key for the location dimension.
        data_tests:
          - not_null
          - unique
      - name: location_name
        description: Business-friendly location label for reporting.

  - name: dim_date
    description: Month-level date dimension for the EV analytics star schema. One row per available reporting month.
    columns:
      - name: dim_date_key
        description: Surrogate primary key for the monthly date dimension in YYYYMM format.
        data_tests:
          - not_null
          - unique
      - name: year_month
        description: Human-readable month label in YYYY-MM format.

  - name: dim_charging_station
    description: Station-level charging dimension with one row per station and retained operator information.
    columns:
      - name: dim_charging_station_key
        description: Surrogate primary key for the charging station dimension.
        data_tests:
          - not_null
          - unique
      - name: station_id
        description: Natural charging station identifier from the EV Roam source.
        data_tests:
          - not_null
          - unique
      - name: operator_name
        description: Normalized operator label retained directly on the station dimension for reporting.
      - name: geo_point_wkt
        description: Well-known text representation of the station point derived from longitude and latitude.

  - name: fct_ev_registration_monthly
    description: Monthly EV registration fact at one row per location and month.
    columns:
      - name: fct_ev_registration_monthly_key
        description: Surrogate primary key for the EV registration monthly fact.
        data_tests:
          - not_null
          - unique
      - name: dim_location_key
        description: Foreign key to dim_location.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_location')
                field: dim_location_key
      - name: dim_date_key
        description: Foreign key to dim_date.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: dim_date_key
      - name: ev_count
        description: Number of EV registrations for the location-month.
        data_tests:
          - not_null
      - name: vehicle_count
        description: Total vehicle registrations for the location-month.
        data_tests:
          - not_null
      - name: population_count
        description: Population associated with the location.

  - name: fct_charging_station_snapshot
    description: Charging infrastructure snapshot fact at one row per location.
    columns:
      - name: fct_charging_station_snapshot_key
        description: Surrogate primary key for the charging station snapshot fact.
        data_tests:
          - not_null
          - unique
      - name: dim_location_key
        description: Foreign key to dim_location.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_location')
                field: dim_location_key
      - name: station_count
        description: Number of charging stations for the location.
        data_tests:
          - not_null
      - name: connector_count
        description: Number of connectors for the location.
        data_tests:
          - not_null

  - name: fct_ev_infrastructure_monthly
    description: Primary aggregate fact table combining EV registrations and charging infrastructure for supply-demand analysis by location and month.
    columns:
      - name: fct_ev_infrastructure_monthly_key
        description: Surrogate primary key for the EV infrastructure monthly fact.
        data_tests:
          - not_null
          - unique
      - name: dim_location_key
        description: Foreign key to dim_location.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_location')
                field: dim_location_key
      - name: dim_date_key
        description: Foreign key to dim_date.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: dim_date_key
      - name: ev_count
        description: Number of EV registrations for the location-month.
        data_tests:
          - not_null
      - name: station_count
        description: Number of charging stations for the location.
        data_tests:
          - not_null
      - name: connector_count
        description: Number of connectors for the location.
        data_tests:
          - not_null
      - name: population_count
        description: Population associated with the location.


  - name: fct_station_nearest_neighbour
    description: Station-level nearest-neighbour fact with one row per charging station and the distance to its closest neighbouring station.
    columns:
      - name: fct_station_nearest_neighbour_key
        description: Surrogate primary key for the nearest-neighbour station fact.
        data_tests:
          - not_null
          - unique
      - name: dim_charging_station_key
        description: Foreign key to the source charging station in dim_charging_station.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_charging_station')
                field: dim_charging_station_key
      - name: nearest_dim_charging_station_key
        description: Foreign key to the nearest neighbouring charging station in dim_charging_station.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_charging_station')
                field: dim_charging_station_key
      - name: distance_km
        description: Great-circle distance in kilometers between the station and its nearest neighbour.
        data_tests:
          - not_null

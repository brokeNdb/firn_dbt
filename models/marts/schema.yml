version: 2

models:
  - name: dim_location
    description: Conformed location dimension with one row per normalized location name. This dimension is built from intermediate location conformance and enrichment models and includes location-level population for downstream mart joins.
    columns:
      - name: location_key
        description: Surrogate primary key for the location dimension. This is the canonical location join key used by mart fact tables.
        data_tests:
          - not_null
          - unique
      - name: normalized_location_name
        description: Canonical lowercased location name used to align intermediate models before joining to the mart layer.
        data_tests:
          - not_null
          - unique

  - name: dim_date
    description: Month-level date dimension with one row per available registration month. This dimension is sourced from the intermediate month spine and provides a reusable date key for monthly mart facts.
    columns:
      - name: date_key
        description: Integer month key in YYYYMM format used by monthly fact tables.
        data_tests:
          - not_null
          - unique
      - name: year_month
        description: Human-readable month label in YYYY-MM format corresponding to the monthly fact grain.
        data_tests:
          - not_null
          - unique

  - name: dim_station_operator
    description: Deduplicated station operator dimension built from the intermediate station operator prep model, with one row per normalized operator name.
    columns:
      - name: operator_key
        description: Surrogate primary key for the station operator dimension.
        data_tests:
          - not_null
          - unique
      - name: normalized_operator_name
        description: Canonical lowercased operator name used to collapse formatting differences in the source data.
        data_tests:
          - not_null
          - unique

  - name: fct_ev_registration_monthly
    description: Monthly EV registration fact with one row per location and registration month. Counts represent all motor vehicle registrations and the EV subset at the location-month grain.
    columns:
      - name: location_id
        description: Foreign key to dim_location identifying the location for the monthly registration counts.
        data_tests:
          - not_null
      - name: month_id
        description: Foreign key to dim_date identifying the registration month.
        data_tests:
          - not_null

  - name: fct_charging_station_snapshot
    description: Charging infrastructure snapshot fact with one row per location. This mart fact stores current charging supply by location and is not modeled as a monthly time series.
    columns:
      - name: location_id
        description: Foreign key to dim_location identifying the location for the charging infrastructure snapshot.
        data_tests:
          - not_null
          - unique

  - name: fct_ev_infrastructure_monthly
    description: Aggregate fact table combining EV registrations and charging infrastructure to analyse supply vs demand across locations and time.
    columns:
      - name: location_id
        description: Foreign key to dim_location identifying the reporting location.
        data_tests:
          - not_null
      - name: month_id
        description: Foreign key to dim_date identifying the reporting month.
        data_tests:
          - not_null
